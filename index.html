<script>
(function(){
    var row=document.querySelector(".home-banner-row");
    var track=document.querySelector(".home-banner-track");
    var dotsWrap=document.querySelector(".home-banner-dots");
    if(!row||!track||!dotsWrap) return;

    var slides=track.querySelectorAll(".home-banner-slide");
    var total=slides.length;
    var index=0;
    var interval=3000;
    var tid;

    for(var i=0;i<total;i++){
        var b=document.createElement("button");
        b.className="home-banner-dot"+(i===0?" active":"");
        b.setAttribute("data-index",i);
        dotsWrap.appendChild(b);
    }

    function update(){
        track.style.transform="translateX("+(-100*index)+"%)";
        var dots=dotsWrap.querySelectorAll(".home-banner-dot");
        dots.forEach((d,i)=>d.classList.toggle("active",i===index));
    }

    function go(i){ index=(i+total)%total; update(); }
    function next(){ go(index+1); }

    dotsWrap.addEventListener("click",function(e){
        if(e.target.classList.contains("home-banner-dot")){
            go(parseInt(e.target.dataset.index));
        }
    });

    function start(){ tid=setInterval(next,interval); }
    function stop(){ clearInterval(tid); }

    row.addEventListener("mouseenter",stop);
    row.addEventListener("mouseleave",start);

    update();
    start();
})();
</script>
